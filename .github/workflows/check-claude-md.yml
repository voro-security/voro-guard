name: CLAUDE.md Drift Check

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-md-drift:
    name: claude-md-drift
    if: github.event.pull_request.draft != true && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for CLAUDE.md drift
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const commentHeader = "## CLAUDE.md Drift Check";
            const sourcePrefixes = ["src/", "app/", "agent_builder/", "packages/"];
            const ignoredSegmentNames = new Set(["tests", "test", "docs", ".github"]);
            const ignoredExtensions = new Set([
              ".md",
              ".yml",
              ".yaml",
              ".json",
              ".toml",
              ".cfg",
              ".ini",
              ".lock",
            ]);

            function isIgnoredPath(filePath) {
              if (filePath === "CLAUDE.md") {
                return false;
              }

              const parts = filePath.split("/");
              if (parts.some((part) => ignoredSegmentNames.has(part))) {
                return true;
              }

              const lastDot = filePath.lastIndexOf(".");
              if (lastDot === -1) {
                return false;
              }

              const extension = filePath.slice(lastDot);
              return ignoredExtensions.has(extension);
            }

            function topLevelModule(filePath) {
              const parts = filePath.split("/");
              return parts.length >= 2 ? `${parts[0]}/${parts[1]}` : parts[0];
            }

            const changedFiles = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner,
                repo,
                pull_number,
                per_page: 100,
              },
              (response) => response.data.map((file) => file.filename),
            );

            const changedSet = new Set(changedFiles);
            const changedSourceFiles = changedFiles.filter((filePath) => {
              if (!sourcePrefixes.some((prefix) => filePath.startsWith(prefix))) {
                return false;
              }
              return !isIgnoredPath(filePath);
            });

            if (changedSourceFiles.length === 0) {
              core.info("No source file changes matched the CLAUDE.md drift watch list.");
              return;
            }

            if (changedSet.has("CLAUDE.md")) {
              core.info("CLAUDE.md changed in this PR; advisory comment not needed.");
              return;
            }

            const grouped = new Map();
            for (const filePath of changedSourceFiles) {
              const group = topLevelModule(filePath);
              if (!grouped.has(group)) {
                grouped.set(group, []);
              }
              grouped.get(group).push(filePath);
            }

            const groupedLines = Array.from(grouped.entries())
              .sort(([left], [right]) => left.localeCompare(right))
              .flatMap(([, files]) => files.sort().map((filePath) => `- \`${filePath}\``));

            const body = [
              commentHeader,
              "",
              "Source files changed in this PR but `CLAUDE.md` was not updated.",
              "",
              "**Changed source modules:**",
              ...groupedLines,
              "",
              "If these changes affect the module inventory, APIs, data flow, or CLI commands documented in the Architectural Reference section of `CLAUDE.md`, please update it in this PR.",
              "",
              "_This is advisory only — not blocking merge._",
            ].join("\n");

            const existingComments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: pull_number,
                per_page: 100,
              },
            );

            const existing = existingComments.find((comment) => {
              return comment.user?.type === "Bot" && typeof comment.body === "string" && comment.body.startsWith(commentHeader);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing advisory comment ${existing.id}.`);
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body,
            });
            core.info("Created new advisory comment.");
