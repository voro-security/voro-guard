name: Lifecycle Post-Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  lifecycle-post-merge:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lifecycle receiver
        env:
          VORO_DOCS_STATUS_PAT: ${{ secrets.VORO_DOCS_STATUS_PAT }}
        run: |
          if [ -z "${VORO_DOCS_STATUS_PAT:-}" ]; then
            echo "ERROR: VORO_DOCS_STATUS_PAT is missing. Requires read access to skylily1/voro-docs." >&2
            exit 1
          fi
          git clone --depth 1 "https://x-access-token:${VORO_DOCS_STATUS_PAT}@github.com/skylily1/voro-docs.git" voro-docs

      - name: Register merged PR lifecycle transition
        run: |
          python3 voro-docs/.github/scripts/register_post_merge_lifecycle_transition.py \
            --pr-url "${{ github.event.pull_request.html_url }}" \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --merged-at "${{ github.event.pull_request.merged_at }}"
